version: '3.8'

services:
  # PostgreSQL service
  db:
    image: postgis/postgis
    container_name: warehub-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - ./data/postgist:/var/lib/postgresql/data
    ports:
      - "5443:5432"

  # Redis service
  redis:
    image: redis:6-alpine
    container_name: warehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend-app:
    container_name: backend-appd
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - 8080:8080

# Volumes to persist data
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

name: warehub