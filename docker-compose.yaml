version: '3.8'

services:
  # PostgreSQL service
  db:
    image: postgis/postgis
    container_name: warehub-db
    environment:
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./data/postgist:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"

  # Redis service
  redis:
    image: redis:6-alpine
    container_name: warehub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

# Volumes to persist data
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

name: warehub